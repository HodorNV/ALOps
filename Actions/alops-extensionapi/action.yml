name: 'ALOpsExtensionAPI'
description: 'Get/Publish extensions with the Business Central API.'
author: 'Hodor'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  # --- authentication ---
  authentication:
    description: 'Authentication method for the API connection. oauth uses Azure AD service-to-service tokens (recommended for SaaS). basic and usernamepassword use user credentials. windows uses Windows integrated authentication (on-premises only, Windows agents only).'
    required: true
    default: 'oauth'
  azure_tenant_id:
    description: 'Azure Active Directory tenant ID (GUID or domain) of the Business Central SaaS tenant.'
    required: false
    default: ''
  azure_app_client_id:
    description: 'Application (client) ID of the Azure AD app registration used for OAuth authentication.'
    required: false
    default: ''
  azure_app_client_secret:
    description: 'Client secret of the Azure AD app registration. Store this value in a pipeline secret variable or Azure Key Vault, never in plain text.'
    required: false
    default: ''
  azure_app_client_certificate:
    description: 'Path, base-64 encoded content, or certificate store reference (CERT:\...) of the certificate (.pfx) used instead of a client secret for Azure AD app authentication.'
    required: false
    default: ''
  azure_app_client_certificate_password:
    description: 'Password protecting the client certificate. Store this in a pipeline secret variable.'
    required: false
    default: ''
  username:
    description: 'Business Central user account name. Used for basic or usernamepassword authentication, or for on-behalf-of OAuth flow. Leave empty for Service-to-Service (app-only) OAuth authentication.'
    required: false
    default: ''
  password:
    description: 'Password for the Business Central user account. Store this in a pipeline secret variable.'
    required: false
    default: ''
  # --- api ---
  interaction:
    description: 'API operation to perform. get lists extensions currently installed on the environment. publish deploys a single .app file. batch deploys multiple .app files in dependency order.'
    required: true
    default: 'get'
  api_endpoint:
    description: 'Base URL of the Business Central API, for example https://api.businesscentral.dynamics.com/v2.0/{tenant}/Sandbox/api for SaaS or http://server:port/BC/api for on-premises.'
    required: true
    default: ''
  dev_endpoint:
    description: 'URL of the Business Central development endpoint used when deploying via the DEV port, for example http://server:7049/BC/dev. When set, extensions are published to this endpoint instead of the automation API.'
    required: false
    default: ''
  apiversion:
    description: 'Version of the Business Central Automation API to use. Supported values are beta, v1.0, and v2.0. Use v2.0 for access to schedule and schema sync mode features.'
    required: true
    default: 'v1.0'
  bccompany:
    description: 'Name or GUID of the Business Central company context for the API call. Leave empty to use the default (first) company.'
    required: false
    default: ''
  # --- deployment ---
  dev_schemeupdatemode:
    description: 'Schema update mode when publishing via the DEV endpoint. synchronize adds new schema objects. recreate drops and recreates tables. forcesync allows breaking changes.'
    required: false
    default: 'synchronize'
  dev_dependencypublishingoption:
    description: 'Dependency handling when publishing via the DEV endpoint. none skips dependencies. default resolves them automatically. ignore skips dependency checks. strict fails if any dependency is missing.'
    required: false
    default: 'none'
  replacepackageid:
    description: 'Generate a new package GUID for each deployment. This forces Business Central to treat each deploy as a fresh installation rather than an upgrade.'
    required: false
    default: 'false'
  blocksymbolsonly:
    description: 'When enabled, the task checks whether the .app is a symbols-only package and blocks deployment if it is, preventing accidental publishing of placeholder apps.'
    required: false
    default: 'false'
  schedule:
    description: 'Deployment schedule for the extension. current deploys immediately. nextminor schedules for the next minor BC update. nextmajor schedules for the next major update. Requires API version 2.0.'
    required: false
    default: 'current'
  schema_sync_mode:
    description: 'Schema synchronization mode for the extension deployment. add only adds new schema objects. forcesync allows breaking schema changes. Requires API version 2.0.'
    required: false
    default: 'add'
  # --- polling ---
  showdeploymentstatus:
    description: 'When enabled, the task polls and displays the extension deployment status after publishing until the operation completes or times out.'
    required: false
    default: 'true'
  checksecondsdelay:
    description: 'Number of seconds to wait between polls when checking deployment status. Increase this for environments with slower deployment operations.'
    required: false
    default: '30'
  maxtries:
    description: 'Maximum number of deployment status polls before the task times out. Multiply by Check Delay to calculate the total maximum wait time.'
    required: false
    default: '20'
  # --- artifacts ---
  artifact_path:
    description: 'Folder containing the .app files to deploy. For publish mode this is the folder where the single .app file is located. For batch mode this is the root folder scanned recursively for .app files.'
    required: false
    default: ''
  artifact_filter:
    description: 'Glob filter applied inside artifact_path to select which .app files to deploy, for example *.app.'
    required: false
    default: '*.app'
  # --- altool ---
  altool_package_version:
    description: 'Version of the ALTool NuGet package to install for app metadata extraction. Required for publish and batch interactions. Leave empty to skip installation (get interaction only).'
    required: false
    default: ''

outputs:
  ALOPS_EXTENSIONAPI_RESULT:
    description: 'JSON result of the last API operation.'
    value: ${{ steps.run.outputs.ALOPS_EXTENSIONAPI_RESULT }}
  ALOPS_EXTENSIONAPI_STATUS:
    description: 'Deployment status of the last published extension.'
    value: ${{ steps.run.outputs.ALOPS_EXTENSIONAPI_STATUS }}

runs:
  using: 'composite'
  steps:
    - name: ALOps Extension API
      id: run
      shell: pwsh
      run: ${{ github.action_path }}/entrypoint.ps1
      env:
          INPUT_AUTHENTICATION: ${{ inputs.authentication }}
          INPUT_AZURE_TENANT_ID: ${{ inputs.azure_tenant_id }}
          INPUT_AZURE_APP_CLIENT_ID: ${{ inputs.azure_app_client_id }}
          INPUT_AZURE_APP_CLIENT_SECRET: ${{ inputs.azure_app_client_secret }}
          INPUT_AZURE_APP_CLIENT_CERTIFICATE: ${{ inputs.azure_app_client_certificate }}
          INPUT_AZURE_APP_CLIENT_CERTIFICATE_PASSWORD: ${{ inputs.azure_app_client_certificate_password }}
          INPUT_USERNAME: ${{ inputs.username }}
          INPUT_PASSWORD: ${{ inputs.password }}
          INPUT_INTERACTION: ${{ inputs.interaction }}
          INPUT_API_ENDPOINT: ${{ inputs.api_endpoint }}
          INPUT_DEV_ENDPOINT: ${{ inputs.dev_endpoint }}
          INPUT_APIVERSION: ${{ inputs.apiversion }}
          INPUT_BCCOMPANY: ${{ inputs.bccompany }}
          INPUT_DEV_SCHEMEUPDATEMODE: ${{ inputs.dev_schemeupdatemode }}
          INPUT_DEV_DEPENDENCYPUBLISHINGOPTION: ${{ inputs.dev_dependencypublishingoption }}
          INPUT_REPLACEPACKAGEID: ${{ inputs.replacepackageid }}
          INPUT_BLOCKSYMBOLSONLY: ${{ inputs.blocksymbolsonly }}
          INPUT_SCHEDULE: ${{ inputs.schedule }}
          INPUT_SCHEMA_SYNC_MODE: ${{ inputs.schema_sync_mode }}
          INPUT_SHOWDEPLOYMENTSTATUS: ${{ inputs.showdeploymentstatus }}
          INPUT_CHECKSECONDSDELAY: ${{ inputs.checksecondsdelay }}
          INPUT_MAXTRIES: ${{ inputs.maxtries }}
          INPUT_ARTIFACT_PATH: ${{ inputs.artifact_path }}
          INPUT_ARTIFACT_FILTER: ${{ inputs.artifact_filter }}
          INPUT_ALTOOL_PACKAGE_VERSION: ${{ inputs.altool_package_version }}
