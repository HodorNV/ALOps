name: 'ALOpsInfo'
description: 'Build agent diagnostic report with system health checks, Docker status, and BC application version discovery.'
author: 'Hodor'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  # --- thresholds ---
  free_mem_threshold:
    description: 'Minimum free memory percentage required. Set to 0 to disable the check.'
    required: false
    default: '0'
  free_mem_threshold_action:
    description: 'Action to take when free memory is below the threshold.'
    required: false
    default: 'Warn'
  free_disk_threshold:
    description: 'Minimum free disk space percentage required per drive. Set to 0 to disable the check.'
    required: false
    default: '0'
  free_disk_threshold_action:
    description: 'Action to take when free disk space is below the threshold.'
    required: false
    default: 'Warn'
  # --- docker ---
  docker_containers_action:
    description: 'Action to take when Docker containers are found on the agent. Set to Ignore to skip the check.'
    required: false
    default: 'Error'

outputs:
  module_version:
    description: 'ALOps module version string.'
    value: ${{ steps.run.outputs.module_version }}
  platform_name:
    description: 'Detected CI platform name.'
    value: ${{ steps.run.outputs.platform_name }}
  alops_application_version:
    description: 'Highest discovered BC application version (Major.Minor.Build.Revision).'
    value: ${{ steps.run.outputs.alops_application_version }}
  alops_application_version_major:
    description: 'Major component of the highest discovered BC application version.'
    value: ${{ steps.run.outputs.alops_application_version_major }}
  alops_application_version_minor:
    description: 'Minor component of the highest discovered BC application version.'
    value: ${{ steps.run.outputs.alops_application_version_minor }}

runs:
  using: 'composite'
  steps:
    - name: ALOps Info
      id: run
      shell: pwsh
      run: ${{ github.action_path }}/entrypoint.ps1
      env:
          INPUT_FREE_MEM_THRESHOLD: ${{ inputs.free_mem_threshold }}
          INPUT_FREE_MEM_THRESHOLD_ACTION: ${{ inputs.free_mem_threshold_action }}
          INPUT_FREE_DISK_THRESHOLD: ${{ inputs.free_disk_threshold }}
          INPUT_FREE_DISK_THRESHOLD_ACTION: ${{ inputs.free_disk_threshold_action }}
          INPUT_DOCKER_CONTAINERS_ACTION: ${{ inputs.docker_containers_action }}
