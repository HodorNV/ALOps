name: 'ALOpsAgentMaintenance'
description: 'Cleanup and maintenance for DevOps agents running Business Central workloads. Supports Docker, BC Artifacts, package and temp caches, and old task cleanup with dry-run mode and disk metrics.'
author: 'Hodor'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  # --- docker ---
  docker_containers:
    description: 'Remove all stopped/exited Docker containers (docker container prune).'
    required: false
    default: 'false'
  docker_images:
    description: 'Remove Docker images older than the specified number of days.'
    required: false
    default: 'false'
  prune_images_days_created:
    description: 'Remove Docker images older than this many days. Set to 0 to skip age-based image pruning. (Only applies when ''Prune Docker Images by Age'' is enabled.)'
    required: false
    default: '0'
  docker_images_by_os:
    description: 'Remove Docker images whose OS version does not match the host OS. Uses direct Docker inspect (no BcContainerHelper dependency). Primarily relevant for Windows containers.'
    required: false
    default: 'false'
  docker_volumes:
    description: 'Remove all dangling (unused) Docker volumes.'
    required: false
    default: 'false'
  docker_build_cache:
    description: 'Remove all Docker build cache (docker builder prune).'
    required: false
    default: 'false'
  # --- artifacts ---
  bc_artifacts:
    description: 'Remove unused BC Artifact cache folders, orphaned VSIX extractions, temp folders, and empty directories.'
    required: false
    default: 'false'
  bc_artifacts_cache_folder:
    description: 'Path to the BC Artifacts cache folder. Leave empty for auto-detection (checks bcaboragentartifactspath env var, then falls back to a platform default). (Only applies when ''Clean BC Artifacts Cache'' is enabled.)'
    required: false
    default: ''
  package_cache:
    description: 'Remove old ALTool/compiler packages from the agent tools directory and old NuGet global cache packages.'
    required: false
    default: 'false'
  # --- agent ---
  old_tasks:
    description: 'Remove old ALOps task version folders from the agent. Auto-detects the current version and removes all older versions. (Azure DevOps agents only.)'
    required: false
    default: 'false'
  agent_temp:
    description: 'Remove old files and folders from the agent temp directory (AGENT_TEMPDIRECTORY / RUNNER_TEMP).'
    required: false
    default: 'false'
  windows_temp:
    description: 'Remove old files and folders from the Windows temp directory (TEMP). Windows agents only; no-ops on other platforms.'
    required: false
    default: 'false'
  # --- advanced ---
  days_unused:
    description: 'Threshold in days for cleanup operations. Items not used within this period are removed. Applies to BC Artifacts, Agent Temp, Windows Temp, and Package Cache operations.'
    required: false
    default: '30'
  dry_run:
    description: 'When enabled, reports what would be cleaned without actually deleting anything. Use this for change-management review before running actual cleanup.'
    required: false
    default: 'false'
  failure_action:
    description: 'How cleanup failures affect the task result. ''Error'' fails the task on any cleanup error. ''Warn'' logs warnings (SucceededWithIssues). ''Ignore'' silently continues.'
    required: false
    default: 'Warn'

outputs:
  freed_bytes:
    description: 'Total bytes freed across all operations.'
    value: ${{ steps.run.outputs.freed_bytes }}
  freed_mb:
    description: 'Total megabytes freed across all operations.'
    value: ${{ steps.run.outputs.freed_mb }}
  images_removed:
    description: 'Number of Docker images removed.'
    value: ${{ steps.run.outputs.images_removed }}
  containers_removed:
    description: 'Number of Docker containers removed.'
    value: ${{ steps.run.outputs.containers_removed }}
  artifacts_removed:
    description: 'Number of BC artifact cache items removed.'
    value: ${{ steps.run.outputs.artifacts_removed }}
  operations_failed:
    description: 'Number of cleanup operations that reported errors.'
    value: ${{ steps.run.outputs.operations_failed }}
  dry_run:
    description: 'Whether the task ran in dry-run mode (no deletions).'
    value: ${{ steps.run.outputs.dry_run }}

runs:
  using: 'composite'
  steps:
    - name: ALOps Agent Maintenance
      id: run
      shell: pwsh
      run: ${{ github.action_path }}/entrypoint.ps1
      env:
          INPUT_DOCKER_CONTAINERS: ${{ inputs.docker_containers }}
          INPUT_DOCKER_IMAGES: ${{ inputs.docker_images }}
          INPUT_PRUNE_IMAGES_DAYS_CREATED: ${{ inputs.prune_images_days_created }}
          INPUT_DOCKER_IMAGES_BY_OS: ${{ inputs.docker_images_by_os }}
          INPUT_DOCKER_VOLUMES: ${{ inputs.docker_volumes }}
          INPUT_DOCKER_BUILD_CACHE: ${{ inputs.docker_build_cache }}
          INPUT_BC_ARTIFACTS: ${{ inputs.bc_artifacts }}
          INPUT_BC_ARTIFACTS_CACHE_FOLDER: ${{ inputs.bc_artifacts_cache_folder }}
          INPUT_PACKAGE_CACHE: ${{ inputs.package_cache }}
          INPUT_OLD_TASKS: ${{ inputs.old_tasks }}
          INPUT_AGENT_TEMP: ${{ inputs.agent_temp }}
          INPUT_WINDOWS_TEMP: ${{ inputs.windows_temp }}
          INPUT_DAYS_UNUSED: ${{ inputs.days_unused }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_FAILURE_ACTION: ${{ inputs.failure_action }}
