name: 'ALOpsDockerExec'
description: 'Execute a PowerShell script inside a Business Central Docker container.'
author: 'Hodor'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  # --- container ---
  fixed_tag:
    description: 'Fixed container label. When set, the container is identified by this value instead of the build ID.'
    required: false
    default: ''
  # --- script ---
  scriptsource:
    description: 'How to provide the script to execute. InLine: enter script text directly. Path: absolute or relative file path. Workfolder: search workspace recursively. Download: fetch from URL.'
    required: false
    default: 'InLine'
  script_location:
    description: 'File path (for Path/Workfolder) or URL (for Download) of the script to execute.'
    required: false
    default: ''
  inline_script:
    description: 'PowerShell script to execute inside the container.'
    required: false
    default: 'Write-Host ''Hello World'''

runs:
  using: 'composite'
  steps:
    - name: ALOps Docker Exec
      id: run
      shell: pwsh
      run: ${{ github.action_path }}/entrypoint.ps1
      env:
          INPUT_FIXED_TAG: ${{ inputs.fixed_tag }}
          INPUT_SCRIPTSOURCE: ${{ inputs.scriptsource }}
          INPUT_SCRIPT_LOCATION: ${{ inputs.script_location }}
          INPUT_INLINE_SCRIPT: ${{ inputs.inline_script }}
