name: 'ALOpsPackageImport'
description: 'Import RapidStart configuration packages into Business Central.'
author: 'Hodor'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  # --- connection ---
  connection_mode:
    description: 'How to connect to Business Central. auto detects the mode from inputs: if fixed_tag is set, uses docker; if api_endpoint is set, uses api; otherwise uses local. Set explicitly to avoid ambiguity.'
    required: true
    default: 'auto'
  nav_serverinstance:
    description: 'BC server instance name for local and docker modes. Typically ''BC'' for modern versions.'
    required: false
    default: 'BC'
  fixed_tag:
    description: 'Docker container label value used to locate the target container. Only used in docker mode.'
    required: false
    default: ''
  # --- authentication ---
  authentication:
    description: 'Authentication method for the API connection. oauth uses Azure AD service-to-service tokens (recommended for SaaS). basic and usernamepassword use user credentials. windows uses Windows integrated authentication (on-premises only, Windows agents only).'
    required: true
    default: 'oauth'
  azure_tenant_id:
    description: 'Azure Active Directory tenant ID (GUID or domain) of the Business Central SaaS tenant.'
    required: false
    default: ''
  azure_app_client_id:
    description: 'Application (client) ID of the Azure AD app registration used for OAuth authentication.'
    required: false
    default: ''
  azure_app_client_secret:
    description: 'Client secret of the Azure AD app registration. Store this value in a pipeline secret variable or Azure Key Vault, never in plain text.'
    required: false
    default: ''
  azure_app_client_certificate:
    description: 'Path, base-64 encoded content, or certificate store reference (CERT:\...) of the certificate (.pfx) used instead of a client secret for Azure AD app authentication.'
    required: false
    default: ''
  azure_app_client_certificate_password:
    description: 'Password protecting the client certificate. Store this in a pipeline secret variable.'
    required: false
    default: ''
  username:
    description: 'Business Central user account name. Used for basic or usernamepassword authentication, or for on-behalf-of OAuth flow.'
    required: false
    default: ''
  password:
    description: 'Password for the Business Central user account. Store this in a pipeline secret variable.'
    required: false
    default: ''
  # --- api ---
  api_endpoint:
    description: 'Base URL of the Business Central API, for example https://api.businesscentral.dynamics.com/v2.0/{tenant}/Sandbox/api for SaaS or http://server:port/BC/api for on-premises. Required for API mode.'
    required: false
    default: ''
  apiversion:
    description: 'Version of the Business Central Automation API to use. Supported values are beta, v1.0, and v2.0.'
    required: true
    default: 'v1.0'
  bccompany:
    description: 'Name or GUID of the Business Central company context for the API call. Leave empty to use the default (first) company.'
    required: false
    default: ''
  # --- packages ---
  package_path:
    description: 'Folder to scan for RapidStart package files. Defaults to the workspace directory when empty.'
    required: false
    default: ''
  package_filter:
    description: 'Glob filter for discovering RapidStart package files in the package path.'
    required: false
    default: '*.rapidstart'
  package_config:
    description: 'Path to a rapidstart.json configuration file that specifies packages to import. When set, overrides package path scanning.'
    required: false
    default: ''
  delete_before_import:
    description: 'Delete the existing configuration package (by code) before creating and importing the new one.'
    required: false
    default: 'true'
  # --- polling ---
  checksecondsdelay:
    description: 'Number of seconds to wait between polls when checking async import/apply status in API mode.'
    required: false
    default: '30'
  maxtries:
    description: 'Maximum number of status polls before the task times out. Multiply by Check Delay to calculate total maximum wait time. Prevents infinite loops.'
    required: false
    default: '20'
  # --- reporting ---
  generate_test_report:
    description: 'Generate an XUnit XML test report summarizing the import results for each package.'
    required: false
    default: 'true'
  test_report_path:
    description: 'Custom output path for the XUnit test report. Defaults to a temporary directory when empty.'
    required: false
    default: ''
  publish_test_report:
    description: 'Upload the generated XUnit test report as a build artifact via Publish-ALOpsArtifact.'
    required: false
    default: 'true'
  # --- advanced ---
  verify_after_import:
    description: 'Query ConfigurationPackageErrors after import to detect and report individual field/record errors.'
    required: false
    default: 'true'
  fail_on_package_errors:
    description: 'Fail the task when any package has import errors. When disabled, errors are reported as warnings.'
    required: false
    default: 'true'

outputs:
  ALOPS_PACKAGEIMPORT_RESULT:
    description: 'JSON result summary of all packages processed.'
    value: ${{ steps.run.outputs.ALOPS_PACKAGEIMPORT_RESULT }}
  ALOPS_PACKAGEIMPORT_STATUS:
    description: 'Final status: Succeeded, PartiallySucceeded, or Failed.'
    value: ${{ steps.run.outputs.ALOPS_PACKAGEIMPORT_STATUS }}
  ALOPS_PACKAGEIMPORT_REPORT_PATH:
    description: 'Path to generated XUnit test report.'
    value: ${{ steps.run.outputs.ALOPS_PACKAGEIMPORT_REPORT_PATH }}

runs:
  using: 'composite'
  steps:
    - name: ALOps Package Import
      id: run
      shell: pwsh
      run: ${{ github.action_path }}/entrypoint.ps1
      env:
          INPUT_CONNECTION_MODE: ${{ inputs.connection_mode }}
          INPUT_NAV_SERVERINSTANCE: ${{ inputs.nav_serverinstance }}
          INPUT_FIXED_TAG: ${{ inputs.fixed_tag }}
          INPUT_AUTHENTICATION: ${{ inputs.authentication }}
          INPUT_AZURE_TENANT_ID: ${{ inputs.azure_tenant_id }}
          INPUT_AZURE_APP_CLIENT_ID: ${{ inputs.azure_app_client_id }}
          INPUT_AZURE_APP_CLIENT_SECRET: ${{ inputs.azure_app_client_secret }}
          INPUT_AZURE_APP_CLIENT_CERTIFICATE: ${{ inputs.azure_app_client_certificate }}
          INPUT_AZURE_APP_CLIENT_CERTIFICATE_PASSWORD: ${{ inputs.azure_app_client_certificate_password }}
          INPUT_USERNAME: ${{ inputs.username }}
          INPUT_PASSWORD: ${{ inputs.password }}
          INPUT_API_ENDPOINT: ${{ inputs.api_endpoint }}
          INPUT_APIVERSION: ${{ inputs.apiversion }}
          INPUT_BCCOMPANY: ${{ inputs.bccompany }}
          INPUT_PACKAGE_PATH: ${{ inputs.package_path }}
          INPUT_PACKAGE_FILTER: ${{ inputs.package_filter }}
          INPUT_PACKAGE_CONFIG: ${{ inputs.package_config }}
          INPUT_DELETE_BEFORE_IMPORT: ${{ inputs.delete_before_import }}
          INPUT_CHECKSECONDSDELAY: ${{ inputs.checksecondsdelay }}
          INPUT_MAXTRIES: ${{ inputs.maxtries }}
          INPUT_GENERATE_TEST_REPORT: ${{ inputs.generate_test_report }}
          INPUT_TEST_REPORT_PATH: ${{ inputs.test_report_path }}
          INPUT_PUBLISH_TEST_REPORT: ${{ inputs.publish_test_report }}
          INPUT_VERIFY_AFTER_IMPORT: ${{ inputs.verify_after_import }}
          INPUT_FAIL_ON_PACKAGE_ERRORS: ${{ inputs.fail_on_package_errors }}
