name: 'ALOpsNuGetPublish'
description: 'Publish BC .app files as NuGet packages. Uses altool for manifest reading, pure-PowerShell .nupkg creation, and dotnet nuget push.'
author: 'Hodor'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  # --- altool ---
  altool_package_version:
    description: 'Version of the microsoft.dynamics.businesscentral.development.tools NuGet package. Pin to a specific version for reproducible builds.'
    required: true
    default: '18.0.33.65164-beta'
  # --- authentication ---
  nuget_username:
    description: 'Username for the NuGet source. For Azure DevOps feeds, use any value (e.g. ''az'') combined with a PAT as password.'
    required: false
    default: ''
  nuget_password:
    description: 'Password or Personal Access Token (PAT) for the NuGet source.'
    required: false
    default: ''
  nuget_source_apikey:
    description: 'API Key for the NuGet source. When set, used with dotnet nuget push --api-key.'
    required: false
    default: ''
  # --- source ---
  nuget_source_uri:
    description: 'NuGet feed URL to push packages to.'
    required: true
    default: ''
  artifact_path:
    description: 'Root folder to scan recursively for .app files. Leave empty to use the workspace directory.'
    required: false
    default: ''
  artifact_filter:
    description: 'File filter pattern for selecting .app files to package and publish.'
    required: false
    default: '*.app'
  # --- packaging ---
  suffix:
    description: 'Suffix to append to the NuGet package version (e.g. ''-preview''). Leave empty for no suffix.'
    required: false
    default: ''
  use_suffix_for_dependencies_same_publisher:
    description: 'When enabled, applies the version suffix to dependency version ranges for dependencies from the same publisher.'
    required: false
    default: 'false'
  keep_app_filename:
    description: 'When enabled, uses the original .app filename as the .app entry inside the .nupkg instead of generating a standardized name.'
    required: false
    default: 'false'

outputs:
  published_packages:
    description: 'Semicolon-separated list of published NuGet package IDs.'
    value: ${{ steps.run.outputs.published_packages }}
  published_count:
    description: 'Number of successfully published NuGet packages.'
    value: ${{ steps.run.outputs.published_count }}

runs:
  using: 'composite'
  steps:
    - name: ALOps NuGet Publish
      id: run
      shell: pwsh
      run: ${{ github.action_path }}/entrypoint.ps1
      env:
          INPUT_ALTOOL_PACKAGE_VERSION: ${{ inputs.altool_package_version }}
          INPUT_NUGET_USERNAME: ${{ inputs.nuget_username }}
          INPUT_NUGET_PASSWORD: ${{ inputs.nuget_password }}
          INPUT_NUGET_SOURCE_APIKEY: ${{ inputs.nuget_source_apikey }}
          INPUT_NUGET_SOURCE_URI: ${{ inputs.nuget_source_uri }}
          INPUT_ARTIFACT_PATH: ${{ inputs.artifact_path }}
          INPUT_ARTIFACT_FILTER: ${{ inputs.artifact_filter }}
          INPUT_SUFFIX: ${{ inputs.suffix }}
          INPUT_USE_SUFFIX_FOR_DEPENDENCIES_SAME_PUBLISHER: ${{ inputs.use_suffix_for_dependencies_same_publisher }}
          INPUT_KEEP_APP_FILENAME: ${{ inputs.keep_app_filename }}
