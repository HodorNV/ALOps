name: 'ALOpsAppSign'
description: 'Sign Business Central .app files using PFX certificates or HSM (Azure Key Vault / Trusted Signing).  **Runs on:** Windows only.'
author: 'Hodor'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  # --- signing ---
  signmethod:
    description: 'Signing method: PFX for file-based certificate signing, HSM for hardware security module signing (Azure Key Vault or Trusted Signing).'
    required: true
    default: 'PFX'
  usedocker:
    description: 'Run signing inside a Docker container. The app and PFX are copied into the container, signed, and copied back.'
    required: false
    default: 'false'
  fixed_tag:
    description: 'Fixed container label. When set, uses this value to locate the Docker container instead of the build ID.'
    required: false
    default: ''
  timestamp_uri:
    description: 'Time-stamping authority URL. Defaults to http://timestamp.digicert.com if empty.'
    required: false
    default: ''
  hsmmethod:
    description: 'HSM signing method: KEYVAULT for Azure Key Vault, TRUSTED for Azure Trusted Signing.'
    required: false
    default: 'KEYVAULT'
  hsm_description:
    description: 'Description text embedded in the digital signature.'
    required: false
    default: ''
  hsm_description_url:
    description: 'URL embedded in the digital signature description.'
    required: false
    default: ''
  hsm_digestalgorithm:
    description: 'Hash algorithm for digest and timestamp. Default: sha256.'
    required: false
    default: 'sha256'
  # --- source ---
  batchsigncompiledapps:
    description: 'Sign all apps from the ALOPS_COMPILE_ARTIFACT_ARRAY variable (set by ALOpsAppCompiler).'
    required: false
    default: 'false'
  artifact_path:
    description: 'Path to the folder containing .app files to sign. Leave empty to scan the workspace directory.'
    required: false
    default: ''
  nav_artifact_app_filter:
    description: 'Glob filter for .app files to sign.'
    required: false
    default: '*.app'
  # --- pfx ---
  pfx_path:
    description: 'Path or URL to the PFX certificate file. If a URL is provided, the file is downloaded automatically.'
    required: false
    default: ''
  pfx_password:
    description: 'Password for the PFX certificate. Store this in a pipeline secret variable.'
    required: false
    default: ''
  # --- hsm_trusted ---
  hsm_signing_endpoint:
    description: 'Azure Trusted Signing endpoint URL.'
    required: false
    default: ''
  hsm_signing_account:
    description: 'Azure Trusted Signing account name.'
    required: false
    default: ''
  hsm_trusted_certificateprofile:
    description: 'Certificate profile name for Azure Trusted Signing.'
    required: false
    default: ''
  # --- hsm_keyvault ---
  hsm_keyvault_name:
    description: 'Azure Key Vault name (just the name, not the full URL).'
    required: false
    default: ''
  hsm_keyvault_certificate_name:
    description: 'Certificate name in the Azure Key Vault.'
    required: false
    default: ''
  hsm_tenantid:
    description: 'Azure AD tenant ID for service principal authentication. Leave empty for managed identity.'
    required: false
    default: ''
  hsm_clientid:
    description: 'Azure AD application (client) ID for service principal authentication. Leave empty for managed identity.'
    required: false
    default: ''
  hsm_client_secret:
    description: 'Azure AD client secret for service principal authentication. Store this in a pipeline secret variable.'
    required: false
    default: ''

outputs:
  signed_artifact_path:
    description: 'Path to the last signed .app file.'
    value: ${{ steps.run.outputs.signed_artifact_path }}
  signed_artifact_paths:
    description: 'Comma-separated list of all signed .app file paths.'
    value: ${{ steps.run.outputs.signed_artifact_paths }}

runs:
  using: 'composite'
  steps:
    - name: ALOps App Sign
      id: run
      shell: pwsh
      run: ${{ github.action_path }}/entrypoint.ps1
      env:
          INPUT_SIGNMETHOD: ${{ inputs.signmethod }}
          INPUT_USEDOCKER: ${{ inputs.usedocker }}
          INPUT_FIXED_TAG: ${{ inputs.fixed_tag }}
          INPUT_TIMESTAMP_URI: ${{ inputs.timestamp_uri }}
          INPUT_HSMMETHOD: ${{ inputs.hsmmethod }}
          INPUT_HSM_DESCRIPTION: ${{ inputs.hsm_description }}
          INPUT_HSM_DESCRIPTION_URL: ${{ inputs.hsm_description_url }}
          INPUT_HSM_DIGESTALGORITHM: ${{ inputs.hsm_digestalgorithm }}
          INPUT_BATCHSIGNCOMPILEDAPPS: ${{ inputs.batchsigncompiledapps }}
          INPUT_ARTIFACT_PATH: ${{ inputs.artifact_path }}
          INPUT_NAV_ARTIFACT_APP_FILTER: ${{ inputs.nav_artifact_app_filter }}
          INPUT_PFX_PATH: ${{ inputs.pfx_path }}
          INPUT_PFX_PASSWORD: ${{ inputs.pfx_password }}
          INPUT_HSM_SIGNING_ENDPOINT: ${{ inputs.hsm_signing_endpoint }}
          INPUT_HSM_SIGNING_ACCOUNT: ${{ inputs.hsm_signing_account }}
          INPUT_HSM_TRUSTED_CERTIFICATEPROFILE: ${{ inputs.hsm_trusted_certificateprofile }}
          INPUT_HSM_KEYVAULT_NAME: ${{ inputs.hsm_keyvault_name }}
          INPUT_HSM_KEYVAULT_CERTIFICATE_NAME: ${{ inputs.hsm_keyvault_certificate_name }}
          INPUT_HSM_TENANTID: ${{ inputs.hsm_tenantid }}
          INPUT_HSM_CLIENTID: ${{ inputs.hsm_clientid }}
          INPUT_HSM_CLIENT_SECRET: ${{ inputs.hsm_client_secret }}
