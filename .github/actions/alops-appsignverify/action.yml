name: 'ALOpsAppSignVerify'
description: 'Verify Authenticode signatures on Business Central .app files.'
author: 'Hodor'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  # --- docker ---
  usedocker:
    description: 'Run signature verification inside a Docker container. The app is copied into the container, verified, and the result is returned.'
    required: false
    default: 'false'
  fixed_tag:
    description: 'Fixed container label. When set, uses this value to locate the Docker container instead of the build ID.'
    required: false
    default: ''
  # --- source ---
  artifact_path:
    description: 'Path to the folder containing .app files to verify. Leave empty to scan the workspace directory.'
    required: false
    default: ''
  nav_artifact_app_filter:
    description: 'Glob filter for .app files to verify.'
    required: false
    default: '*.app'
  batchverifycompiledapps:
    description: 'Verify all apps from the ALOPS_COMPILE_ARTIFACT_ARRAY variable (set by ALOpsAppCompiler).'
    required: false
    default: 'false'

outputs:
  verified_artifact_path:
    description: 'Path to the last verified .app file.'
    value: ${{ steps.run.outputs.verified_artifact_path }}
  verified_artifact_paths:
    description: 'Comma-separated list of all verified .app file paths.'
    value: ${{ steps.run.outputs.verified_artifact_paths }}

runs:
  using: 'composite'
  steps:
    - name: ALOps App Sign Verify
      id: run
      shell: pwsh
      run: ${{ github.action_path }}/entrypoint.ps1
      env:
          INPUT_USEDOCKER: ${{ inputs.usedocker }}
          INPUT_FIXED_TAG: ${{ inputs.fixed_tag }}
          INPUT_ARTIFACT_PATH: ${{ inputs.artifact_path }}
          INPUT_NAV_ARTIFACT_APP_FILTER: ${{ inputs.nav_artifact_app_filter }}
          INPUT_BATCHVERIFYCOMPILEDAPPS: ${{ inputs.batchverifycompiledapps }}
